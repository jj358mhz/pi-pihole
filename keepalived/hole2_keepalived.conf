global_defs {
    router_id raspberrypi-hole2.local
    script_user root
    enable_script_security
}

vrrp_script chk_ftl {
    script "/etc/scripts/chk_ftl"
    interval 1
    weight -10
}

vrrp_instance PIHOLE {
    state BACKUP
    interface eth0
    virtual_router_id 55
    priority 145
    advert_int 1

    unicast_src_ip 192.168.53.52
    unicast_peer {
        192.168.53.51
    }

    authentication {
        auth_type PASS
        auth_pass <REDACTED_SEE_1PASSWORD>
    }

    virtual_ipaddress {
        192.168.53.53/24
    }

    track_script {
        chk_ftl
    }
}
